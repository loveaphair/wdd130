<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>GitHub Links Generator</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 2rem;
      max-width: 600px;
      margin: auto;
    }
    label, input, button {
      font-size: 1rem;
    }
    input {
      width: 100%;
      padding: 0.5rem;
      margin: 0.5rem 0 1rem;
    }
    a {
      display: block;
      margin: 0.5rem 0;
    }
  </style>
</head>
<body>
  <h1>GitHub Link Generator</h1>
  <label for="username">GitHub Username:</label>
  <input type="text" id="username" placeholder="Enter GitHub username">
  <button onclick="generateLinks()">Generate Links</button>

  <div id="results" style="margin-top: 1rem;"></div>

  <script>
    function generateLinks() {
      const username = document.getElementById('username').value.trim();
      const results = document.getElementById('results');

      if (username === '') {
        results.innerHTML = '<p>Please enter a username.</p>';
        return;
      }

      const repoLink = `https://github.com/${username}/wdd130`;
      const pagesLink = `https://${username}.github.io/wdd130`;

      results.innerHTML = `
        <p><strong>GitHub Repo:</strong> <a href="${repoLink}" target="_blank">${repoLink}</a></p>
        <p><strong>GitHub Pages:</strong> <a href="${pagesLink}" target="_blank">${pagesLink}</a></p>
      `;
    }
  </script>
</body>
</html>
